name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: install
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: lint
        run: ruff check src tests
      - name: test
        run: pytest -q
